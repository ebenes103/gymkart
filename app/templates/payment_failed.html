{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-20 text-center">
    <div class="bg-white rounded-2xl shadow-xl p-10">
        <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-times-circle text-4xl text-red-600"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-800 mb-4">Payment Failed</h1>
        <p class="text-gray-600 mb-6">Your payment could not be processed. Please try again.</p>
        <a href="{% url 'cart' %}" class="bg-red-600 text-white px-6 py-3 rounded-lg hover:bg-red-700 transition inline-block">Go to Cart</a>
    </div>
</div>
{% endblock %}
