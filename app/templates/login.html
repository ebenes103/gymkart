{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="min-h-screen flex items-center justify-center bg-cover bg-center relative"
     style="background-image: url('{% static 'images/gym-bg.jpg' %}');">

    <!-- Dark Overlay -->
    <div class="absolute inset-0 bg-black/70"></div>

    <!-- Login Card -->
    <div class="relative w-full max-w-md bg-white/90 backdrop-blur-lg rounded-3xl shadow-2xl p-10">

        <!-- Logo / Title -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-gray-800">
                GymKart
            </h1>
            <p class="text-gray-500 mt-2">
                Login to your account
            </p>
        </div>

        {% if error %}
        <div class="bg-red-100 text-red-600 p-3 rounded-lg text-center mb-5">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <!-- Username -->
            <div>
                <label class="block text-gray-700 font-semibold mb-1">
                    Username
                </label>
                <input type="text" name="username"
                    placeholder="Enter your username"
                    class="w-full p-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500">
            </div>

            <!-- Password -->
            <div>
                <label class="block text-gray-700 font-semibold mb-1">
                    Password
                </label>
                <input type="password" name="password"
                    placeholder="Enter your password"
                    class="w-full p-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500">
            </div>

            <!-- Login Button -->
            <button type="submit"
                class="w-full bg-red-500 text-white py-3 rounded-xl font-semibold hover:bg-red-600 transition duration-300">
                Login
            </button>

        </form>

        <!-- Divider -->
        <div class="flex items-center my-6">
            <div class="flex-grow h-px bg-gray-300"></div>
            <span class="px-3 text-gray-400 text-sm">OR</span>
            <div class="flex-grow h-px bg-gray-300"></div>
        </div>

        <!-- Register -->
        <p class="text-center text-gray-600">
            Don't have an account?
            <a href="{% url 'register' %}" class="text-red-600 font-semibold hover:underline">
                Sign up
            </a>
        </p>

    </div>

</div>

{% endblock %}
