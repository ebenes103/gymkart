{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="min-h-screen flex items-center justify-center bg-cover bg-center relative"
     style="background-image: url('{% static 'images/gym-bg.jpg' %}');">

    <!-- Dark Overlay -->
    <div class="absolute inset-0 bg-black/70"></div>

    <!-- Register Card -->
    <div class="relative w-full max-w-lg bg-white/90 backdrop-blur-lg rounded-3xl shadow-2xl p-10">

        <!-- Title -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-gray-800">
                Create Account
            </h1>
            <p class="text-gray-500 mt-2">
                Join GymKart today
            </p>
        </div>

        {% if form.errors %}
        <div class="bg-red-100 text-red-600 p-3 rounded-lg text-center mb-5">
            {{ form.errors }}
        </div>
        {% endif %}

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <!-- Username -->
            <div>
                <label class="block text-gray-700 font-semibold mb-1">
                    Username
                </label>
                {{ form.username }}
            </div>

            <!-- Email -->
            <div>
                <label class="block text-gray-700 font-semibold mb-1">
                    Email
                </label>
                {{ form.email }}
            </div>

            <!-- Password -->
            <div>
                <label class="block text-gray-700 font-semibold mb-1">
                    Password
                </label>
                {{ form.password1 }}
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="block text-gray-700 font-semibold mb-1">
                    Confirm Password
                </label>
                {{ form.password2 }}
            </div>

            <!-- Role Selection -->
            <div>
                <label class="block text-gray-700 font-semibold mb-2">
                    Select Role
                </label>

                <div class="flex gap-6">

                    <label class="flex items-center gap-2">
                        <input type="radio" name="role" value="buyer" checked
                               class="accent-red-500">
                        Buyer
                    </label>

                    <label class="flex items-center gap-2">
                        <input type="radio" name="role" value="seller"
                               class="accent-red-500">
                        Seller
                    </label>

                </div>
            </div>

            <!-- Register Button -->
            <button type="submit"
                class="w-full bg-red-500 text-white py-3 rounded-xl font-semibold hover:bg-red-600 transition duration-300">
                Register
            </button>

        </form>

        <!-- Divider -->
        <div class="flex items-center my-6">
            <div class="flex-grow h-px bg-gray-300"></div>
            <span class="px-3 text-gray-400 text-sm">OR</span>
            <div class="flex-grow h-px bg-gray-300"></div>
        </div>

        <!-- Login link -->
        <p class="text-center text-gray-600">
            Already have an account?
            <a href="{% url 'login' %}" class="text-red-600 font-semibold hover:underline">
                Login
            </a>
        </p>

    </div>

</div>

{% endblock %}
