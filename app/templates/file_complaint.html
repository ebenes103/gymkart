{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="max-w-2xl mx-auto px-4 py-10">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-red-600 px-6 py-4">
            <h1 class="text-2xl font-bold text-white">File a Complaint</h1>
        </div>
        
        <div class="p-6">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Seller *</label>
                    <select name="seller_id" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
                        <option value="">Select Seller</option>
                        {% for seller in sellers %}
                        <option value="{{ seller.id }}">{{ seller.username }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Order ID (Optional)</label>
                    <input type="text" name="order_id" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500" placeholder="Enter order ID if applicable">
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Complaint Type *</label>
                    <select name="complaint_type" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
                        <option value="">Select Complaint Type</option>
                        <option value="seller_refused_return">Seller Refused Return</option>
                        <option value="seller_refused_refund">Seller Refused Refund</option>
                        <option value="damaged_product">Damaged Product Received</option>
                        <option value="wrong_product">Wrong Product Received</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Description *</label>
                    <textarea name="description" rows="5" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500" placeholder="Please describe your issue in detail..."></textarea>
                </div>
                
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Upload Supporting Image (Optional)</label>
                    <input type="file" name="image" accept="image/*" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
                </div>
                
                <button type="submit" class="w-full bg-red-600 text-white py-3 rounded-lg font-semibold hover:bg-red-700 transition">
                    File Complaint
                </button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
